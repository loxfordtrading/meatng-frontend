<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F8F8"/>
      <stop offset="100%" stop-color="#E9F4DE"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E2EFE3"/>
    </linearGradient>
    <linearGradient id="box-inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F8F8"/>
    </linearGradient>
    <radialGradient id="meat" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(160 200)">
      <stop offset="0%" stop-color="#B04949"/>
      <stop offset="60%" stop-color="#8E3232"/>
      <stop offset="100%" stop-color="#6C1F1F"/>
    </radialGradient>
    <radialGradient id="marble" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(60 80)">
      <stop offset="0%" stop-color="#F6DADA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E2AFAF" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#0F0F0F" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <circle cx="320" cy="240" r="220" fill="#EEFFEF" opacity="0.6"/>
  <circle cx="540" cy="120" r="120" fill="#E2EFE3" opacity="0.45"/>
  <circle cx="1680" cy="140" r="180" fill="#EEFFEF" opacity="0.6"/>
  <circle cx="1500" cy="260" r="140" fill="#E2EFE3" opacity="0.5"/>

  <g transform="translate(980 230)" filter="url(#shadow)">
    <rect x="0" y="190" width="760" height="420" rx="32" fill="#E2EFE3" stroke="#D5E7D7" stroke-width="2"/>
    <rect x="40" y="40" width="680" height="210" rx="28" fill="url(#box)" stroke="#D5E7D7" stroke-width="2"/>
    <rect x="80" y="230" width="600" height="300" rx="24" fill="url(#box-inner)" stroke="#E2EFE3" stroke-width="2"/>

    <rect x="100" y="150" width="200" height="56" rx="12" fill="#218225"/>
    <rect x="118" y="168" width="92" height="12" rx="6" fill="#2ACC32"/>
    <rect x="218" y="168" width="64" height="12" rx="6" fill="#EEFFEF"/>

    <g transform="translate(160 290)">
      <ellipse cx="110" cy="120" rx="120" ry="90" fill="url(#meat)"/>
      <ellipse cx="110" cy="120" rx="50" ry="35" fill="url(#marble)"/>
    </g>
    <g transform="translate(400 280)">
      <ellipse cx="130" cy="130" rx="140" ry="100" fill="url(#meat)"/>
      <ellipse cx="120" cy="120" rx="60" ry="40" fill="url(#marble)"/>
    </g>
    <g transform="translate(270 410)">
      <ellipse cx="110" cy="90" rx="120" ry="80" fill="url(#meat)"/>
      <ellipse cx="110" cy="90" rx="55" ry="34" fill="url(#marble)"/>
    </g>

    <circle cx="610" cy="480" r="20" fill="#2ACC32"/>
    <circle cx="570" cy="520" r="14" fill="#218225"/>
    <circle cx="640" cy="520" r="10" fill="#218225"/>
    <circle cx="600" cy="540" r="12" fill="#2ACC32"/>
  </g>
</svg>
